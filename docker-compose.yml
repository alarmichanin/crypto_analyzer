services:
  api: 
    build: ./api
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app/api
    environment:
      FLASK_DEBUG: 1
    command: flask run -h 0.0.0.0
  db:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - db:/var/lib/postgresql/data
  adminer:
    image: adminer
    ports:
      - 8080:8080
volumes:
  db:
