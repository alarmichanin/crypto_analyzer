[tool.ruff]
target-version = "py314"
line-length = 88
indent-width = 4
exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  "api/**/migrations/**",
]

[tool.ruff.lint]
select = [
  "E", "F", "W", "I", "B", "UP", "SIM", "N",
]
ignore = [
  "E501",
  "W291",
  "W293",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["api/tests"]
pythonpath = ["api"]
addopts = "-q --maxfail=1 --disable-warnings"
